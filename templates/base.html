<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="utf-8">
    <title>
        {% block title %}{% endblock title %} - Robert Yin
    </title>
    <base target="_blank">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.sand.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.colors.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flexboxgrid/6.3.1/flexboxgrid.min.css">
    <link rel="stylesheet" href="/static/styles/main.css">
    {% if custom_stylesheet %}
        <link rel="stylesheet" href="/static/styles/{{ custom_stylesheet }}.css">
    {% endif %}
</head>

<body>
    <main>
        {% block content %}{% endblock content %}
    </main>
    <footer>
        <section>
            <p>
                <a href="https://github.com/bobertoyin/bobertoyin.com">Source code</a>
                is licensed <a rel="license" href="https://choosealicense.com/licenses/mit/">MIT</a>.
                Currently <code><a href="/changelog">v{{ version }}</a></code>.
            </p>
        </section>
    </footer>
</body>
